<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Simulador de Partículas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="ui">
    <h2>⚛️ Simulador de Partículas — Modelo Padrão</h2>
    <p style="margin: 6px 0 16px; opacity: 0.85;">c = 30 | Criação de Pares</p>

    <!-- Léptons -->
    <div class="section">
      <div class="section-title leptons">🟦 Léptons</div>
      <div id="leptonsGrid" class="particle-grid"></div>
    </div>

    <!-- Antiléptons -->
    <div class="section">
      <div class="section-title antileptons">🟥 Antiléptons</div>
      <div id="antileptonsGrid" class="particle-grid"></div>
    </div>

    <!-- Quarks -->
    <div class="section">
      <div class="section-title quarks">🟨 Quarks</div>
      <div id="quarksGrid" class="particle-grid"></div>
    </div>

    <!-- Antiquarks -->
    <div class="section">
      <div class="section-title antiquarks">🟧 Antiquarks</div>
      <div id="antiquarksGrid" class="particle-grid"></div>
    </div>

    <!-- Bósons -->
    <div class="section">
      <div class="section-title bosons">🟩 Bósons + Gráviton</div>
      <div id="bosonsGrid" class="particle-grid"></div>
    </div>

    <!-- Controles numéricos -->
    <div class="control-group">
      <label>Velocidade inicial (0–30):</label>
      <input type="number" id="speedInput" min="0" max="30" value="5" step="1">

      <label>Direção (°):</label>
      <input type="number" id="angleInput" min="0" max="359" value="0" step="1">
    </div>

    <div class="button-group">
      <button id="btnAdd">➕ Adicionar Partícula Selecionada</button>
      <button id="btnRandom">🎲 Aleatória</button>
    </div>

    <div class="button-group">
      <button id="btnPause" style="flex:1;">⏸️ Pausar</button>
      <button id="btnRestart" style="flex:1;">🔄 Limpar Tudo</button>
    </div>

    <div class="zoom-group">
      <button id="zoomOutBtn">➖ Zoom Out</button>
      <button id="zoomInBtn">➕ Zoom In</button>
      <button id="resetViewBtn">🖥️ Visão Padrão</button>
    </div>

    <div id="status">
      🔹 Partículas: <span id="count">0</span> | <span id="state">Rodando</span>
    </div>

    <div class="energy-bar"><div class="energy-fill" id="energyFill"></div></div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/catalogo.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/forces.js"></script>
  <script src="js/collisions.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/particle.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
